<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Team X</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
        <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">Team X</a>
            </div>
            <div class="nav-menu" id="nav-menu">
                <a href="index.html" class="nav-link active">Home</a>
                <a href="team.html" class="nav-link">Team</a>
                <a href="games.html" class="nav-link">Games</a>
                <a href="gallery.html" class="nav-link">Gallery</a>
                <a href="social.html" class="nav-link">Social</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <section class="contact-section">
        <div class="container">
            <h1 class="page-title">Get In Touch</h1>
            <div class="contact-content">
                <div class="contact-info">
                    <h3>Contact Info</h3>
                    <div class="contact-item">
                        <i class="fas fa-envelope"></i>
                        <span>hello@teamx.com</span>
                    </div>
                    <div class="contact-item">
                        <i class="fas fa-discord"></i>
                        <span>Team X Discord</span>
                    </div>
                    <div class="contact-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>Online Only 🌐</span>
                    </div>
                </div>
                <form class="contact-form" id="contact-form">
                    <div class="form-group">
                        <input type="email" id="email" placeholder="Your Email" required>
                    </div>
                    <div class="form-group">
                        <textarea id="message" placeholder="Your Message" rows="6" required></textarea>
                    </div>
                    <button type="submit" class="cta-button">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <footer class="footer"><!-- Same footer --></footer>

    <script src="js/script.js"></script>
</body>
</html>
